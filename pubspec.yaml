name: bloomix
description: Lego çiçek buketi tasarım platformu
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  provider: ^6.1.1
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  smooth_page_indicator: ^1.1.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  lottie: ^3.1.2
  supabase_flutter: ^2.8.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/flowers/
    - assets/images/
    - assets/animations/
    - assets/special_days/
